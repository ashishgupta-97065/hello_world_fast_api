<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BMI Calculator — Mini-Apps</title>
  <style>
:root {
  --bg: #0f1117;
  --surface: #1a1d2e;
  --border: #2d3150;
  --text: #e8eaf6;
  --text-muted: #7986a3;
  --accent: #5c6bc0;
  --accent-hover: #7986cb;
  --success: #26a69a;
  --warning: #ffa726;
  --danger: #ef5350;
  --info: #42a5f5;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); text-decoration: underline; }

/* Top bar */
.top-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.75rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.top-bar-link {
  color: var(--accent);
  font-size: 0.9rem;
  white-space: nowrap;
}
.top-bar-link:hover { color: var(--accent-hover); }
.top-bar-title {
  font-weight: 600;
  font-size: 1rem;
  color: var(--text);
}

/* Container */
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* Menu */
.menu-container {
  max-width: 960px;
  margin: 0 auto;
  padding: 3rem 1.5rem 2rem;
}
.menu-hero { text-align: center; margin-bottom: 2.5rem; }
.menu-hero h1 { font-size: 2.2rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
.menu-hero p { color: var(--text-muted); font-size: 1.1rem; }
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.25rem;
}
.card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  text-decoration: none;
  color: var(--text);
  transition: transform 0.15s ease, border-color 0.15s ease;
}
.card:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
  text-decoration: none;
  color: var(--text);
}
.card-emoji { font-size: 2rem; margin-bottom: 0.75rem; }
.card-name { font-weight: 600; font-size: 1rem; margin-bottom: 0.35rem; }
.card-desc { font-size: 0.85rem; color: var(--text-muted); }
.menu-footer { text-align: center; margin-top: 3rem; color: var(--text-muted); font-size: 0.85rem; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 0.55rem 1.2rem;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.15s ease, opacity 0.15s ease;
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-secondary:hover:not(:disabled) { border-color: var(--accent); }
.btn-ghost { background: transparent; color: var(--accent); border-color: var(--accent); }
.btn-ghost:hover:not(:disabled) { background: rgba(92,107,192,0.12); }

/* Inputs */
input[type="text"], input[type="number"], input[type="range"], textarea, select {
  width: 100%;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.55rem 0.85rem;
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s ease;
}
input[type="range"] { padding: 0; cursor: pointer; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 120px; }

/* Badge */
.badge {
  display: inline-block;
  padding: 0.25rem 0.65rem;
  border-radius: 999px;
  font-size: 0.8rem;
  font-weight: 600;
}
.badge-success { background: rgba(38,166,154,0.2); color: var(--success); }
.badge-warning { background: rgba(255,167,38,0.2); color: var(--warning); }
.badge-danger  { background: rgba(239,83,80,0.2);  color: var(--danger);  }
.badge-info    { background: rgba(66,165,245,0.2);  color: var(--info);    }

/* Validation */
.validation {
  color: var(--danger);
  font-size: 0.85rem;
  margin-top: 0.4rem;
  display: none;
}
.validation.visible { display: block; }

/* Utility */
.muted { color: var(--text-muted); }
.mono { font-family: 'Courier New', Courier, monospace; }

/* Tabs */
.tab-strip {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
}
.tab {
  padding: 0.5rem 1rem;
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  font-size: 0.9rem;
  background: none;
  color: var(--text-muted);
  border: 1px solid transparent;
  border-bottom: none;
  margin-bottom: -1px;
}
.tab.active {
  color: var(--text);
  background: var(--surface);
  border-color: var(--border);
  border-bottom-color: var(--surface);
}
.tab:hover:not(.active) { color: var(--text); }
</style>
</head>
<body>
  <header class="top-bar">
    <a class="top-bar-link" href="../../">← Back to Menu</a>
    <span class="top-bar-title">BMI Calculator</span>
  </header>
  <main class="container">
<h1 style="margin-bottom:1.5rem">BMI Calculator</h1>
<div style="max-width:400px">
  <div style="margin-bottom:1rem">
    <label for="height-input" style="display:block;margin-bottom:0.35rem;font-size:0.9rem">Height (cm)</label>
    <input type="number" id="height-input" placeholder="e.g. 175" min="1" step="0.1">
  </div>
  <div style="margin-bottom:1rem">
    <label for="weight-input" style="display:block;margin-bottom:0.35rem;font-size:0.9rem">Weight (kg)</label>
    <input type="number" id="weight-input" placeholder="e.g. 70" min="1" step="0.1">
  </div>
  <button class="btn btn-primary" id="calc-btn" style="margin-bottom:0.5rem">Calculate</button>
  <p class="validation" id="bmi-error">Please enter valid positive values for height and weight.</p>
  <div id="bmi-result" style="display:none;margin-top:1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem">
    <div style="font-size:2.5rem;font-weight:700;margin-bottom:0.5rem" id="bmi-value"></div>
    <div id="bmi-badge" class="badge" style="font-size:0.9rem;margin-bottom:0.75rem"></div>
    <div class="muted" style="font-size:0.85rem">
      Underweight: &lt;18.5 &nbsp;|&nbsp; Normal: 18.5–24.9 &nbsp;|&nbsp; Overweight: 25–29.9 &nbsp;|&nbsp; Obese: ≥30
    </div>
  </div>
</div>
</main>
  <script>(()=>{ 
  document.getElementById('calc-btn').onclick = function() {
    const heightEl = document.getElementById('height-input');
    const weightEl = document.getElementById('weight-input');
    const errorEl  = document.getElementById('bmi-error');
    const resultEl = document.getElementById('bmi-result');
    const valueEl  = document.getElementById('bmi-value');
    const badgeEl  = document.getElementById('bmi-badge');

    const h = parseFloat(heightEl.value);
    const w = parseFloat(weightEl.value);

    if (!h || !w || h <= 0 || w <= 0 || isNaN(h) || isNaN(w)) {
      errorEl.classList.add('visible');
      resultEl.style.display = 'none';
      return;
    }
    errorEl.classList.remove('visible');

    const heightM = h / 100;
    const bmi = w / (heightM * heightM);
    valueEl.textContent = bmi.toFixed(1);

    let category, badgeClass;
    if (bmi < 18.5) {
      category  = 'Underweight'; badgeClass = 'badge-info';
    } else if (bmi < 25) {
      category  = 'Normal';      badgeClass = 'badge-success';
    } else if (bmi < 30) {
      category  = 'Overweight';  badgeClass = 'badge-warning';
    } else {
      category  = 'Obese';       badgeClass = 'badge-danger';
    }
    badgeEl.textContent = category;
    badgeEl.className   = 'badge ' + badgeClass;
    resultEl.style.display = 'block';
  };
 })();</script>
</body>
</html>
