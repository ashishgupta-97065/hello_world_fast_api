<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Unit Converter — Mini-Apps</title>
  <style>
:root {
  --bg: #0f1117;
  --surface: #1a1d2e;
  --border: #2d3150;
  --text: #e8eaf6;
  --text-muted: #7986a3;
  --accent: #5c6bc0;
  --accent-hover: #7986cb;
  --success: #26a69a;
  --warning: #ffa726;
  --danger: #ef5350;
  --info: #42a5f5;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); text-decoration: underline; }

/* Top bar */
.top-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.75rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.top-bar-link {
  color: var(--accent);
  font-size: 0.9rem;
  white-space: nowrap;
}
.top-bar-link:hover { color: var(--accent-hover); }
.top-bar-title {
  font-weight: 600;
  font-size: 1rem;
  color: var(--text);
}

/* Container */
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* Menu */
.menu-container {
  max-width: 960px;
  margin: 0 auto;
  padding: 3rem 1.5rem 2rem;
}
.menu-hero { text-align: center; margin-bottom: 2.5rem; }
.menu-hero h1 { font-size: 2.2rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
.menu-hero p { color: var(--text-muted); font-size: 1.1rem; }
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.25rem;
}
.card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  text-decoration: none;
  color: var(--text);
  transition: transform 0.15s ease, border-color 0.15s ease;
}
.card:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
  text-decoration: none;
  color: var(--text);
}
.card-emoji { font-size: 2rem; margin-bottom: 0.75rem; }
.card-name { font-weight: 600; font-size: 1rem; margin-bottom: 0.35rem; }
.card-desc { font-size: 0.85rem; color: var(--text-muted); }
.menu-footer { text-align: center; margin-top: 3rem; color: var(--text-muted); font-size: 0.85rem; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 0.55rem 1.2rem;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.15s ease, opacity 0.15s ease;
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-secondary:hover:not(:disabled) { border-color: var(--accent); }
.btn-ghost { background: transparent; color: var(--accent); border-color: var(--accent); }
.btn-ghost:hover:not(:disabled) { background: rgba(92,107,192,0.12); }

/* Inputs */
input[type="text"], input[type="number"], input[type="range"], textarea, select {
  width: 100%;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.55rem 0.85rem;
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s ease;
}
input[type="range"] { padding: 0; cursor: pointer; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 120px; }

/* Badge */
.badge {
  display: inline-block;
  padding: 0.25rem 0.65rem;
  border-radius: 999px;
  font-size: 0.8rem;
  font-weight: 600;
}
.badge-success { background: rgba(38,166,154,0.2); color: var(--success); }
.badge-warning { background: rgba(255,167,38,0.2); color: var(--warning); }
.badge-danger  { background: rgba(239,83,80,0.2);  color: var(--danger);  }
.badge-info    { background: rgba(66,165,245,0.2);  color: var(--info);    }

/* Validation */
.validation {
  color: var(--danger);
  font-size: 0.85rem;
  margin-top: 0.4rem;
  display: none;
}
.validation.visible { display: block; }

/* Utility */
.muted { color: var(--text-muted); }
.mono { font-family: 'Courier New', Courier, monospace; }

/* Tabs */
.tab-strip {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
}
.tab {
  padding: 0.5rem 1rem;
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  font-size: 0.9rem;
  background: none;
  color: var(--text-muted);
  border: 1px solid transparent;
  border-bottom: none;
  margin-bottom: -1px;
}
.tab.active {
  color: var(--text);
  background: var(--surface);
  border-color: var(--border);
  border-bottom-color: var(--surface);
}
.tab:hover:not(.active) { color: var(--text); }
</style>
</head>
<body>
  <header class="top-bar">
    <a class="top-bar-link" href="../../">← Back to Menu</a>
    <span class="top-bar-title">Unit Converter</span>
  </header>
  <main class="container">
<h1 style="margin-bottom:1.5rem">Unit Converter</h1>
<div class="tab-strip">
  <button class="tab active" id="tab-length" onclick="showTab('length')">Length</button>
  <button class="tab" id="tab-weight" onclick="showTab('weight')">Weight</button>
  <button class="tab" id="tab-temperature" onclick="showTab('temperature')">Temperature</button>
</div>

<!-- Length form -->
<div id="form-length" style="display:block">
  <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
    <input type="number" id="len-val" placeholder="Value" style="max-width:160px" oninput="convertLength()">
    <select id="len-from" onchange="convertLength()" style="max-width:160px">
      <option value="m">Meters</option>
      <option value="km">Kilometers</option>
      <option value="mi">Miles</option>
      <option value="ft">Feet</option>
    </select>
    <span class="muted">→</span>
    <select id="len-to" onchange="convertLength()" style="max-width:160px">
      <option value="km">Kilometers</option>
      <option value="m">Meters</option>
      <option value="mi">Miles</option>
      <option value="ft">Feet</option>
    </select>
    <span id="len-result" style="font-size:1.25rem;font-weight:600;min-width:100px">—</span>
  </div>
</div>

<!-- Weight form -->
<div id="form-weight" style="display:none">
  <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
    <input type="number" id="wt-val" placeholder="Value" style="max-width:160px" oninput="convertWeight()">
    <select id="wt-from" onchange="convertWeight()" style="max-width:160px">
      <option value="kg">Kilograms</option>
      <option value="lb">Pounds</option>
      <option value="g">Grams</option>
      <option value="oz">Ounces</option>
    </select>
    <span class="muted">→</span>
    <select id="wt-to" onchange="convertWeight()" style="max-width:160px">
      <option value="lb">Pounds</option>
      <option value="kg">Kilograms</option>
      <option value="g">Grams</option>
      <option value="oz">Ounces</option>
    </select>
    <span id="wt-result" style="font-size:1.25rem;font-weight:600;min-width:100px">—</span>
  </div>
</div>

<!-- Temperature form -->
<div id="form-temperature" style="display:none">
  <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
    <input type="number" id="tmp-val" placeholder="Value" style="max-width:160px" oninput="convertTemp()">
    <select id="tmp-from" onchange="convertTemp()" style="max-width:160px">
      <option value="C">Celsius</option>
      <option value="F">Fahrenheit</option>
      <option value="K">Kelvin</option>
    </select>
    <span class="muted">→</span>
    <select id="tmp-to" onchange="convertTemp()" style="max-width:160px">
      <option value="F">Fahrenheit</option>
      <option value="C">Celsius</option>
      <option value="K">Kelvin</option>
    </select>
    <span id="tmp-result" style="font-size:1.25rem;font-weight:600;min-width:100px">—</span>
  </div>
</div>
</main>
  <script>(()=>{ 
  // Length factors to meters
  const LEN_TO_M = { m: 1, km: 1000, mi: 1609.344, ft: 0.3048 };
  // Weight factors to grams
  const WT_TO_G  = { kg: 1000, lb: 453.592, g: 1, oz: 28.3495 };

  function fmt(val) {
    if (isNaN(val)) return '—';
    return Number(val.toFixed(4)).toString();
  }

  function showTab(name) {
    ['length', 'weight', 'temperature'].forEach(t => {
      document.getElementById('form-' + t).style.display = t === name ? 'block' : 'none';
      const tab = document.getElementById('tab-' + t);
      tab.className = 'tab' + (t === name ? ' active' : '');
    });
  }

  function convertLength() {
    const v = parseFloat(document.getElementById('len-val').value);
    const from = document.getElementById('len-from').value;
    const to   = document.getElementById('len-to').value;
    const el   = document.getElementById('len-result');
    if (isNaN(v)) { el.textContent = '—'; return; }
    el.textContent = fmt(v * LEN_TO_M[from] / LEN_TO_M[to]);
  }

  function convertWeight() {
    const v = parseFloat(document.getElementById('wt-val').value);
    const from = document.getElementById('wt-from').value;
    const to   = document.getElementById('wt-to').value;
    const el   = document.getElementById('wt-result');
    if (isNaN(v)) { el.textContent = '—'; return; }
    el.textContent = fmt(v * WT_TO_G[from] / WT_TO_G[to]);
  }

  function convertTemp() {
    const v = parseFloat(document.getElementById('tmp-val').value);
    const from = document.getElementById('tmp-from').value;
    const to   = document.getElementById('tmp-to').value;
    const el   = document.getElementById('tmp-result');
    if (isNaN(v)) { el.textContent = '—'; return; }
    let result;
    if (from === to) {
      result = v;
    } else if (from === 'C' && to === 'F') {
      result = v * 9/5 + 32;
    } else if (from === 'F' && to === 'C') {
      result = (v - 32) * 5/9;
    } else if (from === 'C' && to === 'K') {
      result = v + 273.15;
    } else if (from === 'K' && to === 'C') {
      result = v - 273.15;
    } else if (from === 'F' && to === 'K') {
      result = (v - 32) * 5/9 + 273.15;
    } else if (from === 'K' && to === 'F') {
      result = (v - 273.15) * 9/5 + 32;
    }
    el.textContent = fmt(result);
  }

  // Expose tab switcher to onclick handlers in HTML (outside IIFE)
  window.showTab = showTab;
  window.convertLength = convertLength;
  window.convertWeight = convertWeight;
  window.convertTemp = convertTemp;
 })();</script>
</body>
</html>
