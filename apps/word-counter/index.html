<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Word Counter — Mini-Apps</title>
  <style>
:root {
  --bg: #0f1117;
  --surface: #1a1d2e;
  --border: #2d3150;
  --text: #e8eaf6;
  --text-muted: #7986a3;
  --accent: #5c6bc0;
  --accent-hover: #7986cb;
  --success: #26a69a;
  --warning: #ffa726;
  --danger: #ef5350;
  --info: #42a5f5;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); text-decoration: underline; }

/* Top bar */
.top-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.75rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.top-bar-link {
  color: var(--accent);
  font-size: 0.9rem;
  white-space: nowrap;
}
.top-bar-link:hover { color: var(--accent-hover); }
.top-bar-title {
  font-weight: 600;
  font-size: 1rem;
  color: var(--text);
}

/* Container */
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* Menu */
.menu-container {
  max-width: 960px;
  margin: 0 auto;
  padding: 3rem 1.5rem 2rem;
}
.menu-hero { text-align: center; margin-bottom: 2.5rem; }
.menu-hero h1 { font-size: 2.2rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
.menu-hero p { color: var(--text-muted); font-size: 1.1rem; }
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.25rem;
}
.card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  text-decoration: none;
  color: var(--text);
  transition: transform 0.15s ease, border-color 0.15s ease;
}
.card:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
  text-decoration: none;
  color: var(--text);
}
.card-emoji { font-size: 2rem; margin-bottom: 0.75rem; }
.card-name { font-weight: 600; font-size: 1rem; margin-bottom: 0.35rem; }
.card-desc { font-size: 0.85rem; color: var(--text-muted); }
.menu-footer { text-align: center; margin-top: 3rem; color: var(--text-muted); font-size: 0.85rem; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 0.55rem 1.2rem;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.15s ease, opacity 0.15s ease;
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-secondary:hover:not(:disabled) { border-color: var(--accent); }
.btn-ghost { background: transparent; color: var(--accent); border-color: var(--accent); }
.btn-ghost:hover:not(:disabled) { background: rgba(92,107,192,0.12); }

/* Inputs */
input[type="text"], input[type="number"], input[type="range"], textarea, select {
  width: 100%;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.55rem 0.85rem;
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s ease;
}
input[type="range"] { padding: 0; cursor: pointer; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 120px; }

/* Badge */
.badge {
  display: inline-block;
  padding: 0.25rem 0.65rem;
  border-radius: 999px;
  font-size: 0.8rem;
  font-weight: 600;
}
.badge-success { background: rgba(38,166,154,0.2); color: var(--success); }
.badge-warning { background: rgba(255,167,38,0.2); color: var(--warning); }
.badge-danger  { background: rgba(239,83,80,0.2);  color: var(--danger);  }
.badge-info    { background: rgba(66,165,245,0.2);  color: var(--info);    }

/* Validation */
.validation {
  color: var(--danger);
  font-size: 0.85rem;
  margin-top: 0.4rem;
  display: none;
}
.validation.visible { display: block; }

/* Utility */
.muted { color: var(--text-muted); }
.mono { font-family: 'Courier New', Courier, monospace; }

/* Tabs */
.tab-strip {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
}
.tab {
  padding: 0.5rem 1rem;
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  font-size: 0.9rem;
  background: none;
  color: var(--text-muted);
  border: 1px solid transparent;
  border-bottom: none;
  margin-bottom: -1px;
}
.tab.active {
  color: var(--text);
  background: var(--surface);
  border-color: var(--border);
  border-bottom-color: var(--surface);
}
.tab:hover:not(.active) { color: var(--text); }

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 1rem;
  margin-top: 1.25rem;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  text-align: center;
}
.stat-value {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--accent);
  display: block;
}
.stat-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>
  <header class="top-bar">
    <a class="top-bar-link" href="../../">← Back to Menu</a>
    <span class="top-bar-title">Word Counter</span>
  </header>
  <main class="container">
<h1 style="margin-bottom:1.5rem">Word Counter</h1>
<textarea id="wc-input" placeholder="Type or paste your text here…" style="height:200px"></textarea>
<div class="stat-grid">
  <div class="stat-card">
    <span class="stat-value" id="stat-words">0</span>
    <span class="stat-label">Words</span>
  </div>
  <div class="stat-card">
    <span class="stat-value" id="stat-chars">0</span>
    <span class="stat-label">Characters</span>
  </div>
  <div class="stat-card">
    <span class="stat-value" id="stat-sentences">0</span>
    <span class="stat-label">Sentences</span>
  </div>
  <div class="stat-card">
    <span class="stat-value" id="stat-paragraphs">0</span>
    <span class="stat-label">Paragraphs</span>
  </div>
  <div class="stat-card">
    <span class="stat-value" id="stat-reading-time">0 min</span>
    <span class="stat-label">Reading Time</span>
  </div>
</div>
</main>
  <script>(()=>{ 
  const input = document.getElementById('wc-input');

  function update() {
    const text = input.value;

    const words = text.trim() ? text.trim().split(/\s+/).filter(Boolean).length : 0;
    const characters = text.length;
    const sentenceMatches = text.match(/[.!?]+/g);
    const sentences = sentenceMatches ? sentenceMatches.length : 0;
    const paragraphs = text.trim() ? text.trim().split(/\n{2,}/).filter(Boolean).length : 0;
    const readingTime = words === 0 ? '0 min' : Math.ceil(words / 200) + ' min';

    document.getElementById('stat-words').textContent      = words;
    document.getElementById('stat-chars').textContent      = characters;
    document.getElementById('stat-sentences').textContent  = sentences;
    document.getElementById('stat-paragraphs').textContent = paragraphs;
    document.getElementById('stat-reading-time').textContent = readingTime;
  }

  input.oninput = update;
  update();
 })();</script>
</body>
</html>
