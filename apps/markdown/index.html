<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Markdown Previewer — Mini-Apps</title>
  <style>
:root {
  --bg: #0f1117;
  --surface: #1a1d2e;
  --border: #2d3150;
  --text: #e8eaf6;
  --text-muted: #7986a3;
  --accent: #5c6bc0;
  --accent-hover: #7986cb;
  --success: #26a69a;
  --warning: #ffa726;
  --danger: #ef5350;
  --info: #42a5f5;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); text-decoration: underline; }

/* Top bar */
.top-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.75rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.top-bar-link {
  color: var(--accent);
  font-size: 0.9rem;
  white-space: nowrap;
}
.top-bar-link:hover { color: var(--accent-hover); }
.top-bar-title {
  font-weight: 600;
  font-size: 1rem;
  color: var(--text);
}

/* Container */
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* Menu */
.menu-container {
  max-width: 960px;
  margin: 0 auto;
  padding: 3rem 1.5rem 2rem;
}
.menu-hero { text-align: center; margin-bottom: 2.5rem; }
.menu-hero h1 { font-size: 2.2rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
.menu-hero p { color: var(--text-muted); font-size: 1.1rem; }
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.25rem;
}
.card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  text-decoration: none;
  color: var(--text);
  transition: transform 0.15s ease, border-color 0.15s ease;
}
.card:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
  text-decoration: none;
  color: var(--text);
}
.card-emoji { font-size: 2rem; margin-bottom: 0.75rem; }
.card-name { font-weight: 600; font-size: 1rem; margin-bottom: 0.35rem; }
.card-desc { font-size: 0.85rem; color: var(--text-muted); }
.menu-footer { text-align: center; margin-top: 3rem; color: var(--text-muted); font-size: 0.85rem; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 0.55rem 1.2rem;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.15s ease, opacity 0.15s ease;
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-secondary:hover:not(:disabled) { border-color: var(--accent); }
.btn-ghost { background: transparent; color: var(--accent); border-color: var(--accent); }
.btn-ghost:hover:not(:disabled) { background: rgba(92,107,192,0.12); }

/* Inputs */
input[type="text"], input[type="number"], input[type="range"], textarea, select {
  width: 100%;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.55rem 0.85rem;
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s ease;
}
input[type="range"] { padding: 0; cursor: pointer; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 120px; }

/* Badge */
.badge {
  display: inline-block;
  padding: 0.25rem 0.65rem;
  border-radius: 999px;
  font-size: 0.8rem;
  font-weight: 600;
}
.badge-success { background: rgba(38,166,154,0.2); color: var(--success); }
.badge-warning { background: rgba(255,167,38,0.2); color: var(--warning); }
.badge-danger  { background: rgba(239,83,80,0.2);  color: var(--danger);  }
.badge-info    { background: rgba(66,165,245,0.2);  color: var(--info);    }

/* Validation */
.validation {
  color: var(--danger);
  font-size: 0.85rem;
  margin-top: 0.4rem;
  display: none;
}
.validation.visible { display: block; }

/* Utility */
.muted { color: var(--text-muted); }
.mono { font-family: 'Courier New', Courier, monospace; }

/* Tabs */
.tab-strip {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
}
.tab {
  padding: 0.5rem 1rem;
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  font-size: 0.9rem;
  background: none;
  color: var(--text-muted);
  border: 1px solid transparent;
  border-bottom: none;
  margin-bottom: -1px;
}
.tab.active {
  color: var(--text);
  background: var(--surface);
  border-color: var(--border);
  border-bottom-color: var(--surface);
}
.tab:hover:not(.active) { color: var(--text); }

.md-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  height: calc(100vh - 120px);
  min-height: 400px;
}
.md-pane { display: flex; flex-direction: column; gap: 0.5rem; }
.md-label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
#md-input  { flex: 1; resize: none; font-family: monospace; }
#md-preview {
  flex: 1;
  overflow-y: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.85rem;
  line-height: 1.7;
}
#md-preview h1 { font-size:1.6rem; margin-bottom:0.5rem; border-bottom:1px solid var(--border); padding-bottom:0.3rem; }
#md-preview h2 { font-size:1.3rem; margin-bottom:0.4rem; }
#md-preview h3 { font-size:1.1rem; margin-bottom:0.35rem; }
#md-preview p  { margin-bottom:0.75rem; }
#md-preview ul { padding-left:1.5rem; margin-bottom:0.75rem; }
#md-preview li { margin-bottom:0.25rem; }
#md-preview code { background:rgba(255,255,255,0.08); padding:0.15rem 0.35rem; border-radius:4px; font-size:0.85em; }
#md-preview strong { font-weight:700; }
#md-preview em { font-style:italic; }
#md-preview a  { color:var(--accent); }
</style>
</head>
<body>
  <header class="top-bar">
    <a class="top-bar-link" href="../../">← Back to Menu</a>
    <span class="top-bar-title">Markdown Previewer</span>
  </header>
  <main class="container">
<div class="md-grid">
  <div class="md-pane">
    <div class="md-label">Markdown Input</div>
    <textarea id="md-input" placeholder="Type Markdown here…"># Hello, Markdown!\n\nType **bold**, *italic*, `inline code`, or a [link](https://example.com).\n\n## Lists\n\n- Item one\n- Item two\n- Item three</textarea>
  </div>
  <div class="md-pane">
    <div class="md-label">Preview</div>
    <div id="md-preview" aria-label="preview output"></div>
  </div>
</div>
</main>
  <script>(()=>{ 
  const input   = document.getElementById('md-input');
  const preview = document.getElementById('md-preview');

  function parseMarkdown(raw) {
    // 1. HTML-escape
    let s = raw
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    const lines = s.split('\n');
    const out = [];
    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      // Headings (must come before other replacements)
      if (/^### /.test(line)) { out.push('<h3>' + inlineReplace(line.slice(4)) + '</h3>'); i++; continue; }
      if (/^## /.test(line))  { out.push('<h2>' + inlineReplace(line.slice(3)) + '</h2>'); i++; continue; }
      if (/^# /.test(line))   { out.push('<h1>' + inlineReplace(line.slice(2)) + '</h1>'); i++; continue; }
      // Unordered list
      if (/^- /.test(line)) {
        const items = [];
        while (i < lines.length && /^- /.test(lines[i])) {
          items.push('<li>' + inlineReplace(lines[i].slice(2)) + '</li>');
          i++;
        }
        out.push('<ul>' + items.join('') + '</ul>');
        continue;
      }
      // Blank lines
      if (line.trim() === '') { out.push(''); i++; continue; }
      // Paragraph
      const parts = [];
      while (i < lines.length && lines[i].trim() !== '' && !/^[#-]/.test(lines[i])) {
        parts.push(inlineReplace(lines[i]));
        i++;
      }
      if (parts.length) out.push('<p>' + parts.join(' ') + '</p>');
    }
    return out.join('\n');
  }

  function inlineReplace(s) {
    // bold: **text**
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // italic: *text*
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    // inline code: `text`
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    // links: [label](url)
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    return s;
  }

  function update() {
    preview.innerHTML = parseMarkdown(input.value);
  }

  input.oninput = update;
  update();
 })();</script>
</body>
</html>
